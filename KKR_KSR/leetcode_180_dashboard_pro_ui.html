
<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Dashboard</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6fb} .dark{background:#0f172a;color:#fff}
header{position:sticky;top:0;background:#fff;padding:15px;box-shadow:0 2px 8px #0001}
.dark header{background:#111827} .wrap{max-width:1200px;margin:auto;padding:20px}
.topic{background:#fff;border-radius:14px;padding:15px;margin:15px 0} .dark .topic{background:#1f2937}
.q{padding:6px} input[type=text]{padding:10px;width:300px} button{padding:10px}
.bar{height:12px;background:#ddd;border-radius:10px} .fill{height:12px;background:#4f46e5;width:0%}
</style></head><body>
<header><h2>🚀 LeetCode Dashboard Pro V2</h2>
<input id='s' type='text' placeholder='Search...' onkeyup='f()'>
<button onclick='document.body.classList.toggle("dark")'>🌙 Dark</button>
<div id='count'></div><div class='bar'><div id='fill' class='fill'></div></div></header>
<div class='wrap' id='app'></div>
<script>
const data={"Phase 1: Python Logic Building": ["412 Fizz Buzz", "9 Palindrome Number", "69 Sqrt(x)", "66 Plus One", "202 Happy Number", "231 Power of Two", "326 Power of Three", "258 Add Digits", "171 Excel Sheet Column Number", "476 Number Complement", "58 Length of Last Word", "344 Reverse String", "557 Reverse Words III", "125 Valid Palindrome", "520 Detect Capital", "709 To Lower Case", "387 First Unique Character in a String", "383 Ransom Note", "205 Isomorphic Strings", "290 Word Pattern", "26 Remove Duplicates from Sorted Array", "27 Remove Element", "88 Merge Sorted Array", "283 Move Zeroes", "217 Contains Duplicate", "268 Missing Number", "136 Single Number", "169 Majority Element", "724 Find Pivot Index", "1480 Running Sum of 1D Array"], "Phase 2: Strings": ["13 Roman to Integer", "14 Longest Common Prefix", "28 Implement strStr()", "242 Valid Anagram", "345 Reverse Vowels of a String", "3 Longest Substring Without Repeating Characters", "5 Longest Palindromic Substring", "6 Zigzag Conversion", "8 String to Integer", "49 Group Anagrams", "43 Multiply Strings", "438 Find All Anagrams in a String", "394 Decode String", "763 Partition Labels", "767 Reorganize String", "76 Minimum Window Substring", "68 Text Justification", "10 Regular Expression Matching", "72 Edit Distance", "139 Word Break"], "Phase 3: Arrays & Hashing": ["1 Two Sum", "121 Best Time to Buy and Sell Stock", "217 Contains Duplicate", "238 Product of Array Except Self", "53 Maximum Subarray", "347 Top K Frequent Elements", "128 Longest Consecutive Sequence", "36 Valid Sudoku", "Encode and Decode Strings", "560 Subarray Sum Equals K", "229 Majority Element II", "215 Kth Largest Element in an Array", "162 Find Peak Element", "41 First Missing Positive", "189 Rotate Array", "56 Merge Intervals", "57 Insert Interval", "Meeting Rooms", "Meeting Rooms II", "134 Gas Station"], "Phase 4: Two Pointers": ["125 Valid Palindrome", "167 Two Sum II", "15 3Sum", "11 Container With Most Water", "42 Trapping Rain Water", "283 Move Zeroes", "26 Remove Duplicates Sorted Array", "75 Sort Colors", "977 Squares of a Sorted Array", "844 Backspace String Compare"], "Phase 5: Stack": ["20 Valid Parentheses", "155 Min Stack", "682 Baseball Game", "1021 Remove Outermost Parentheses", "844 Backspace String Compare", "150 Evaluate Reverse Polish Notation", "739 Daily Temperatures", "735 Asteroid Collision", "71 Simplify Path", "901 Online Stock Span", "402 Remove K Digits", "503 Next Greater Element II", "853 Car Fleet", "84 Largest Rectangle in Histogram", "224 Basic Calculator"], "Phase 6: Queue & BFS": ["232 Implement Queue using Stacks", "933 Number of Recent Calls", "622 Design Circular Queue", "649 Dota2 Senate", "950 Reveal Cards in Increasing Order", "752 Open the Lock", "994 Rotting Oranges", "1091 Shortest Path in Binary Matrix", "815 Bus Routes", "239 Sliding Window Maximum"], "Phase 7: Trees & BST": ["100 Same Tree", "101 Symmetric Tree", "104 Maximum Depth of Binary Tree", "110 Balanced Binary Tree", "111 Minimum Depth of Binary Tree", "112 Path Sum", "226 Invert Binary Tree", "257 Binary Tree Paths", "543 Diameter of Binary Tree", "572 Subtree of Another Tree", "102 Binary Tree Level Order Traversal", "199 Binary Tree Right Side View", "1448 Count Good Nodes in Binary Tree", "98 Validate BST", "230 Kth Smallest Element in BST", "235 Lowest Common Ancestor BST", "105 Construct Binary Tree", "113 Path Sum II", "337 House Robber III", "450 Delete Node in BST", "297 Serialize and Deserialize Binary Tree", "124 Binary Tree Maximum Path Sum", "99 Recover BST", "987 Vertical Order Traversal", "863 All Nodes Distance K"], "Phase 8: DP": ["70 Climbing Stairs", "198 House Robber", "213 House Robber II", "322 Coin Change", "518 Coin Change II", "300 LIS", "1143 LCS", "416 Partition Equal Subset Sum", "91 Decode Ways", "152 Maximum Product Subarray"], "Phase 9: Graphs": ["200 Number of Islands", "133 Clone Graph", "417 Pacific Atlantic Water Flow", "207 Course Schedule", "210 Course Schedule II", "261 Graph Valid Tree", "684 Redundant Connection", "743 Network Delay Time", "127 Word Ladder", "Alien Dictionary"], "Phase 10: Interview Essentials": ["704 Binary Search", "35 Search Insert Position", "33 Search in Rotated Sorted Array", "153 Find Minimum in Rotated Sorted Array", "875 Koko Eating Bananas", "295 Find Median from Data Stream", "692 Top K Frequent Words", "23 Merge K Sorted Lists", "146 LRU Cache", "981 Time Based Key Value Store", "141 Linked List Cycle", "206 Reverse Linked List", "21 Merge Two Sorted Lists", "143 Reorder List", "2 Add Two Numbers", "138 Copy List with Random Pointer", "142 Linked List Cycle II", "287 Find Duplicate Number", "55 Jump Game", "45 Jump Game II", "51 N-Queens", "46 Permutations", "39 Combination Sum", "78 Subsets", "17 Letter Combinations of Phone Number", "22 Generate Parentheses", "131 Palindrome Partitioning", "37 Sudoku Solver", "312 Burst Balloons", "44 Wildcard Matching"]};
let idx=0,html='';
for(const [topic,qs] of Object.entries(data)){
 html+=`<div class="topic"><h3>${topic}</h3>`;
 qs.forEach(q=>{html+=`<div class='q'><input class='c' data-i='${idx}' type='checkbox'> ${q}</div>`; idx++;});
 html+='</div>';
}
app.innerHTML=html;
document.querySelectorAll('.c').forEach(c=>{let i=c.dataset.i;c.checked=localStorage['lc'+i]=='1';c.onchange=()=>{localStorage['lc'+i]=c.checked?'1':'0';u();}});
function u(){let a=[...document.querySelectorAll('.c')],d=a.filter(x=>x.checked).length;count.innerHTML=`Solved ${d} / ${a.length} | Remaining ${a.length-d}`;fill.style.width=(d/a.length*100)+'%';}
function f(){let s=document.getElementById('s').value.toLowerCase();document.querySelectorAll('.q').forEach(x=>x.style.display=x.innerText.toLowerCase().includes(s)?'block':'none');}
u();
</script></body></html>
